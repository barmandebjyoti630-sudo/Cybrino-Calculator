<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBRINO Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#050816,#0c1023);
overflow:hidden;
}

.bg-circle{
position:absolute;
border-radius:50%;
background:rgba(0,195,255,0.08);
animation:float 6s infinite ease-in-out;
}

.bg-circle:nth-child(1){
width:250px;
height:250px;
left:-50px;
top:50px;
}

.bg-circle:nth-child(2){
width:180px;
height:180px;
right:30px;
bottom:40px;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-25px);}
100%{transform:translateY(0px);}
}

.calculator{
position:relative;
z-index:10;
width:360px;
background:rgba(12,16,35,0.95);
padding:25px;
border-radius:30px;
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(0,195,255,0.3);
border:1px solid rgba(255,255,255,0.08);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo h1{
color:#00c3ff;
font-size:32px;
letter-spacing:3px;
text-shadow:0 0 15px #00c3ff;
}

.logo p{
color:#aaa;
font-size:13px;
margin-top:5px;
}

.display{
width:100%;
height:80px;
border:none;
outline:none;
border-radius:20px;
padding:20px;
font-size:34px;
text-align:right;
background:#161b33;
color:white;
margin-bottom:20px;
box-shadow:inset 0 0 10px rgba(0,0,0,0.4);
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
}

button{
height:68px;
border:none;
border-radius:18px;
font-size:22px;
cursor:pointer;
transition:0.3s;
background:#161b33;
color:white;
font-weight:500;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(0,195,255,0.5);
}

.operator{
background:#00c3ff;
color:#000;
font-weight:bold;
}

.equal{
background:#00ff99;
color:#000;
font-weight:bold;
}

.clear{
background:#ff4d6d;
font-weight:bold;
}

.zero{
grid-column:span 2;
}

.footer{
text-align:center;
margin-top:18px;
color:#777;
font-size:12px;
}

</style>
</head>

<body>

<div class="bg-circle"></div>
<div class="bg-circle"></div>

<div class="calculator">

<div class="logo">
<h1>CYBRINO</h1>
<p>Futuristic Calculator</p>
</div>

<input type="text" id="display" class="display" disabled>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="deleteLast()">⌫</button>
<button class="operator" onclick="appendValue('%')">%</button>
<button class="operator" onclick="appendValue('/')">÷</button>

<button onclick="appendValue('7')">7</button>
<button onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('*')">×</button>

<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('-')">−</button>

<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button class="zero" onclick="appendValue('0')">0</button>
<button onclick="appendValue('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

<div class="footer">
© CYBRINO Innovatives
</div>

</div>

<script>

const display = document.getElementById('display');

function appendValue(value){
display.value += value;
}

function clearDisplay(){
display.value = '';
}

function deleteLast(){
display.value = display.value.slice(0,-1);
}

function calculate(){
try{
display.value = eval(display.value);
}
catch{
display.value = 'Error';
}
}

</script>

</body>
</html>
